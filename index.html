<!DOCTYPE HTML>
<html lang="ru" style="overflow: hidden;">

<head>
    <meta charset="UTF-8">
    <title>WoI</title>
    <link rel="icon" href="icon.png">
    <style>
        @font-face {
            font-family: "PixelFont";
            src: url("./src/assets/fonts/Planes_ValMore.ttf");
        }
        * {
            font-family: "PixelFont";
        }
        :root {
            --cursor: auto;
        }
        #root {
            width: 100vw;
            height: 100vh;
            background-color: black;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        #title {
            font-size: 70px;
            z-index: 7;
            cursor: default;
            animation: titleAnimation 2s infinite alternate;
        }
        @keyframes titleAnimation {
            0% {
                text-shadow: 0 0 10px #00b34d;
            }
            100% {
                text-shadow: 0 0 30px #00eb66;
            }
        }
        #canvas {
            border: 3px solid black;
            background-image: url("./src/assets/backgrounds/menu/pixel-art.jpg");
            background-repeat: no-repeat;
            background-size: 1920px 1080px;
            background-color: #00b34d;
            top: 0;
            position: absolute;
            display: none;
        }
        #menu {
            z-index: 10;
            width: 20vw;
            height: 60vh;
        }
        .menuDiv {
            background-color: rgba(28, 27, 56, 0.7);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            border-radius: 10px;
            border: 3px solid black;
        }

        .menuButton {
            width: 60%;
            height: 50px;
            background-color: rgba(28, 27, 56, 1);
            border: 3px solid black;
            border-radius: 10px;
            font-size: large;
            cursor: pointer;
            color: white;
        }
        .menuButton:hover {
            background-color: #00b34d;
            transition-duration: 0.3s;
        }
        .menuButton:active {
            background-color: #00ff1a;
        }
    </style>
    <noscript>Enable javascript to play this game</noscript>
</head>

<body style="margin: auto;">
    <button id="start" style="text-align: center; 
    font-size: 2000px; color: black; background-color: black;">click</button>

    <div id="root">
        <h1 id="title">World Of Illusions</h1>
        <div id="menu">

        </div>
    </div>

    <canvas id="canvas"><canvas>

            <script type="module" src="src/main.js"></script>
</body>

</html>
